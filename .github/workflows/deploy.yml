name: Deploy to GitHub Pages

# main 에 푸시되면 정적 export(out/)를 빌드해 GitHub Pages 로 배포한다.
# 최초 1회: 레포 Settings → Pages → Source 를 "GitHub Actions" 로 설정해야 활성화됨.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건만 (진행 중이면 취소)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # 프로젝트 페이지 하위 경로(/agent-maker). 사용자/조직 페이지면 빈 값으로.
          PAGES_BASE_PATH: /${{ github.event.repository.name }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
